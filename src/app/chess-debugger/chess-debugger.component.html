  <header>
    <h2>Chess Engine Debugger</h2>
    <div class="actions">
      <button (click)="resetGame()" class="btn-reset">Reset Game</button>
    </div>
  </header>

  <section class="simulation-input">
    <h3>Simulator</h3>
    <div class="simulator-controls">
      <textarea [ngModel]="movesInput()" (ngModelChange)="movesInput.set($event)" 
                placeholder="Paste algebraic moves e.g. e2e4 e7e5 f1c4"
                rows="3">
      </textarea>
      <div class="sim-actions-row">
        <label>Delay (ms): 
          <input type="number" [ngModel]="simulationDelayMs()" (ngModelChange)="simulationDelayMs.set($event)" min="0" step="100" style="width: 80px;">
        </label>
        <button (click)="simulateMoves()" [disabled]="isSimulating()" class="btn-execute">Play</button>
        <button (click)="stopSimulation()" [disabled]="!isSimulating()">Stop</button>
      </div>
    </div>
  </section>

  <section class="random-simulation">
    <h3>Random Simulation</h3>
    <div class="simulator-controls">
      <div class="sim-actions-row sim-row-wrap">
        <label>Delay (ms):
          <input type="number" [ngModel]="randomSimDelayMs()" (ngModelChange)="randomSimDelayMs.set($event)" min="0" step="100" style="width: 80px;">
        </label>
        <button (click)="nextRandomMove()" [disabled]="isRandomSimulating() || gameService.isGameOver" class="btn-execute">Next move</button>
        <button (click)="simulateRandomGame()" [disabled]="isRandomSimulating() || gameService.isGameOver" class="btn-execute">Simulate game</button>
        <button (click)="stopRandomSimulation()" [disabled]="!isRandomSimulating()">Stop</button>
        <button (click)="undoLastMove()" [disabled]="!canUndo()" class="btn-undo">← Undo</button>
        <button (click)="resetRandomSimulation()" class="btn-reset">Reset</button>
      </div>
      @if (isRandomSimulating()) {
        <p class="sim-status">⏳ Simulating random moves...</p>
      }
      @if (gameService.isGameOver) {
        <p class="sim-status game-over">🏁 {{ gameService.gameOverReason }}</p>
      }
    </div>
  </section>

  <section class="history">
    <h3>Move History ({{ gameService.movesHistory.length }})</h3>
    <ul class="history-list">
      <li *ngFor="let move of gameService.movesHistory; let i = index">
        {{ i + 1 }}. [{{ move.from }}] → [{{ move.to }}]
      </li>
    </ul>
  </section>

<div id="complete-board">
  <div id="board">
    @for (row of board; track row) {
      @for (square of row; track square) {
        <div (click)="gameService.handleSquareClick(square)" [ngClass]="[
          square.squareClass,
          square.squareColorClass,
          square.highlight != 'none' ? square.highlight : ''
        ]"
        >
          @if (square.piece) {
            <img [src]="'assets/pieces/' + square.piece.colour + '_' + square.piece.name + '.svg.png'"/>
          }
        </div>
      }
    }
  </div>
</div>
